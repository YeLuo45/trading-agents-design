<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingAgents-CN 设计规范</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-aside: #ffffff;
      --text-primary: #111827;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --code-bg: #f0f0f0;
      --code-text: #374151;
      --pre-bg: #1e1e1e;
      --pre-text: #d4d4d4;
      --nav-hover: #f3f4f6;
      --accent-bg: #eff6ff;
      --accent-text: #1d4ed8;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    html.dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-aside: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --code-bg: #334155;
      --code-text: #e2e8f0;
      --pre-bg: #0f172a;
      --pre-text: #86efac;
      --nav-hover: #334155;
      --accent-bg: #1e3a5f;
      --accent-text: #60a5fa;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.4);
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: background 0.2s, color 0.2s; }
    pre { background: var(--pre-bg); color: var(--pre-text); padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { background: var(--code-bg); color: var(--code-text); padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.875em; }
    pre code { background: transparent; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid var(--border-color); padding: 0.5rem 0.75rem; text-align: left; }
    th { background: var(--bg-secondary); font-weight: 600; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
    .aside { background: var(--bg-aside); border-color: var(--border-color); }
    .nav-link { color: var(--text-secondary); }
    .nav-link:hover { background: var(--nav-hover); }
    .nav-link.active { background: var(--accent-bg); color: var(--accent-text); }
    .text-muted { color: var(--text-muted); }
    .text-primary { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    .arch-pre { background: var(--pre-bg); color: var(--pre-text); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
